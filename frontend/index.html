<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic Prediction</title>
    <meta name="description" content="AI-powered traffic congestion prediction for smart cities">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <h1>Traffic Predictor</h1>
            <p class="subtitle">AI-powered traffic flow forecasting</p>
            
            <form id="prediction-form">
                <div class="form-group">
                    <label for="time">Time</label>
                    <input type="time" id="time" name="Time" value="08:00" required>
                </div>
                
                <div class="form-group">
                    <label for="day">Day</label>
                    <select id="day" name="Day" required>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="road_id">Road ID</label>
                    <select id="road_id" name="Road_ID" required>
                        <option value="Road_A">Road A (Highway)</option>
                        <option value="Road_B">Road B (Arterial)</option>
                        <option value="Road_C">Road C (Downtown)</option>
                        <option value="Road_D">Road D (Residential)</option>
                        <option value="Road_E">Road E (Suburban)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="weather">Weather</label>
                    <select id="weather" name="Weather" required>
                        <option value="Clear">Clear</option>
                        <option value="Rain">Rain</option>
                        <option value="Fog">Fog</option>
                        <option value="Snow">Snow</option>
                    </select>
                </div>
                
                <button type="submit" class="btn">Predict Congestion</button>
            </form>
            
            <div id="result" class="result-box hidden">
                <h3>Predicted Level</h3>
                <div id="congestion-level" class="level-indicator">--</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
